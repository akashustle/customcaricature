<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <title>Offline — Creative Caricature Club</title>
    <link rel="icon" href="/favicon.png" />
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%}
      body{
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
        background:linear-gradient(160deg,#7c3aed 0%,#c026d3 55%,#1e1b4b 100%);
        min-height:100vh;display:flex;align-items:center;justify-content:center;
        color:#fff;padding:24px;overflow:hidden;position:relative
      }
      .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.55;pointer-events:none;animation:drift 12s ease-in-out infinite}
      .orb-1{width:380px;height:380px;background:#a855f7;top:-120px;left:-100px}
      .orb-2{width:420px;height:420px;background:#ec4899;bottom:-140px;right:-120px;animation-delay:-4s}
      .card{
        position:relative;text-align:center;max-width:380px;padding:36px 28px;
        background:rgba(255,255,255,.08);
        backdrop-filter:blur(28px) saturate(160%);
        -webkit-backdrop-filter:blur(28px) saturate(160%);
        border:1px solid rgba(255,255,255,.18);
        border-radius:32px;
        box-shadow:0 30px 80px -20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2)
      }
      .icon-wrap{
        width:88px;height:88px;border-radius:26px;margin:0 auto 22px;
        background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.7) 100%);
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 18px 40px rgba(0,0,0,.25);animation:float 3.4s ease-in-out infinite
      }
      .icon-wrap svg{width:44px;height:44px;color:#7c3aed}
      h1{font-size:26px;font-weight:700;margin-bottom:10px;letter-spacing:-.02em}
      p{opacity:.9;line-height:1.55;margin-bottom:24px;font-size:14.5px}
      .hint{font-size:12px;opacity:.65;margin-top:14px}
      button{
        background:#fff;color:#5b21b6;border:0;padding:14px 32px;border-radius:99px;
        font-weight:700;cursor:pointer;font-size:14.5px;letter-spacing:.02em;
        box-shadow:0 14px 30px rgba(0,0,0,.25);
        transition:transform .2s ease, box-shadow .2s ease;
        display:inline-flex;align-items:center;gap:8px
      }
      button:hover{transform:translateY(-2px);box-shadow:0 18px 38px rgba(0,0,0,.32)}
      button:active{transform:translateY(0)}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}
    </style>
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="card">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="2" y1="2" x2="22" y2="22"/>
          <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
          <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
          <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
          <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/>
          <path d="M5 13a10 10 0 0 1 5.17-2.69"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>Your saved data is still available inside the app — open it again to keep working. We'll auto-reconnect when you're back online.</p>
      <button onclick="location.reload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        Try Again
      </button>
      <div class="hint">Your account, drafts and recent screens are stored on this device.</div>
    </div>
  </body>
</html>
