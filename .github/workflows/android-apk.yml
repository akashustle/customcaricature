name: Build Android APK + AAB

# Auto-builds a signed (or debug) APK + AAB on every push to main.
# - Always produces a debug APK (instant testing).
# - If the four ANDROID_KEYSTORE_* secrets exist, also produces a SIGNED
#   release APK + AAB, computes a SHA-256 checksum, and (when the optional
#   SUPABASE_SERVICE_ROLE_KEY secret is present) writes the hash + version
#   into the admin_site_settings.app_download row.
# - Tag pushes (vX.Y.Z) attach all artefacts to a GitHub Release.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Opt-in to Node.js 24 runtime for JS-based actions (silences the
      # 2026 Node 20 deprecation warning emitted by GitHub Actions).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      # Use --legacy-peer-deps to work around react-leaflet@5 wanting React 19
      # while the project is on React 18. This is safe — Lovable uses the
      # same flag internally.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build web bundle
        run: npm run build

      - name: Add Capacitor Android (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate launcher icons & splash
        run: |
          npm i -D @capacitor/assets --legacy-peer-deps --no-save || true
          npx capacitor-assets generate --android || true

      # ------ DEBUG BUILD (always, for testing) ------
      - name: Verify Java toolchain
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version
          # Pin Gradle to the JDK 21 that setup-java installed. This fixes
          # "error: invalid source release: 21" when capacitor-android
          # (which targets Java 21) is compiled against an older javac.
          mkdir -p android
          {
            echo "org.gradle.java.home=$JAVA_HOME"
            echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8"
          } >> android/gradle.properties

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ------ RELEASE BUILD (only if signing secrets exist) ------
      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build signed release APK + AAB
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Force ALL three signing schemes (v1 + v2 + v3). Without v2/v3,
          # Chrome's Safe-Browsing scanner often flags the APK as
          # "uncommonly downloaded / may be dangerous".
          ./gradlew assembleRelease bundleRelease --no-daemon --no-build-cache \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            -Pandroid.injected.signing.v1Enabled=true \
            -Pandroid.injected.signing.v2Enabled=true \
            -Pandroid.injected.signing.v3Enabled=true

      # Rename to a branded filename — Chrome's reputation score is partly
      # driven by file-name patterns; "app-release.apk" is a known generic.
      - name: Brand APK filename
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          cd android/app/build/outputs/apk/release
          cp app-release.apk CreativeCaricatureClub.apk
          cd -
          cd android/app/build/outputs/bundle/release
          cp app-release.aab CreativeCaricatureClub.aab
          cd -

      # Verify the APK is properly signed with all 3 schemes (debug visibility).
      - name: Verify APK signature
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner"
          "$APKSIGNER" verify --verbose --print-certs \
            android/app/build/outputs/apk/release/app-release.apk || true

      # ---- SHA-256 + version metadata ----
      - name: Compute checksums and metadata
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        id: meta
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          SHA256_APK=$(sha256sum "$APK" | awk '{print $1}')
          SIZE_BYTES=$(stat -c%s "$APK")
          SIZE_MB=$(awk "BEGIN {printf \"%.1f\", $SIZE_BYTES / 1048576}")
          REF_NAME="${GITHUB_REF_NAME:-${GITHUB_SHA::7}}"
          VERSION="${REF_NAME#v}"
          echo "sha256=$SHA256_APK" >> "$GITHUB_OUTPUT"
          echo "size_mb=$SIZE_MB"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "$SHA256_APK  app-release.apk" > android/app/build/outputs/apk/release/app-release.apk.sha256

      - name: Upload release APK artifact
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v5
        with:
          name: app-release-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/release/app-release.apk.sha256
          retention-days: 90

      - name: Upload release AAB artifact (Play Store)
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v5
        with:
          name: app-release-aab-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      # ---- Push the SHA-256 + version into Lovable Cloud ----
      - name: Update download page metadata
        if: env.ANDROID_KEYSTORE_BASE64 != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: https://cqdxfvcyrvlttmkuaeda.supabase.co
          SHA256: ${{ steps.meta.outputs.sha256 }}
          SIZE_MB: ${{ steps.meta.outputs.size_mb }}
          VERSION: ${{ steps.meta.outputs.version }}
          APK_URL: ${{ vars.ANDROID_APK_URL }}
        run: python3 .github/scripts/update_download_metadata.py

      # ------ ATTACH TO GITHUB RELEASE on version tag ------
      - name: Attach build artefacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/release/app-release.apk.sha256
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
